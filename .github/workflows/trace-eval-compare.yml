name: trace-eval-compare

on:
  pull_request:
    branches:
      - main

jobs:
  trace-compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy with deny warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run all tests
        run: cargo test

      - name: Cargo check
        run: cargo check

      - name: Trace eval unit tests
        run: cargo test --bin trace_eval

      - name: Run trace compare
        run: ./scripts/trace_compare.sh

      - name: Soft gate with --gate-json
        continue-on-error: true
        run: |
          set +e
          GATE_JSON=1 ./scripts/eval_gate.sh > trace-gate.json
          GATE_EXIT=$?
          set -e

          OVERALL=$(jq -r '.overall' trace-gate.json)
          REASONS=$(jq -r '.reasons | join(", ")' trace-gate.json)
          BC=$(jq -r '.state_updated.before_count' trace-gate.json)
          AC=$(jq -r '.state_updated.after_count' trace-gate.json)
          BR=$(jq -r '.state_updated.before_rate // "null"' trace-gate.json)
          AR=$(jq -r '.state_updated.after_rate // "null"' trace-gate.json)
          D=$(jq -r '.state_updated.delta // "null"' trace-gate.json)

          echo "### Trace Eval Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| overall | ${OVERALL} |" >> $GITHUB_STEP_SUMMARY
          echo "| before_count | ${BC} |" >> $GITHUB_STEP_SUMMARY
          echo "| after_count | ${AC} |" >> $GITHUB_STEP_SUMMARY
          echo "| before_rate | ${BR} |" >> $GITHUB_STEP_SUMMARY
          echo "| after_rate | ${AR} |" >> $GITHUB_STEP_SUMMARY
          echo "| delta | ${D} |" >> $GITHUB_STEP_SUMMARY
          echo "| reasons | ${REASONS} |" >> $GITHUB_STEP_SUMMARY

          if [ "$OVERALL" = "FAIL" ]; then
            echo "::warning::trace eval gate verdict is FAIL (soft gate, not blocking merge). reasons: ${REASONS}"
          elif [ "$OVERALL" = "WARN" ]; then
            echo "::warning::trace eval gate verdict is WARN. reasons: ${REASONS}"
          fi

          exit 0

      - name: Upload compare report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-eval-compare-report
          path: notes/agent-eval/reports/TRACE-EVAL-COMPARE.md
          if-no-files-found: warn
