name: trace-eval-compare

on:
  pull_request:
    branches:
      - main

jobs:
  trace-compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy with deny warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run all tests
        run: cargo test

      - name: Cargo check
        run: cargo check

      - name: Trace eval unit tests
        run: cargo test --bin trace_eval

      - name: Lint shell scripts
        run: make lint-scripts

      - name: Script regression tests
        run: bash scripts/tests/test_trace_soft_gate.sh

      - name: Run trace compare
        run: ./scripts/trace_compare.sh

      - name: Soft gate with --gate-json
        continue-on-error: true
        run: |
          set +e
          GATE_JSON=1 ./scripts/eval_gate.sh > trace-gate.json
          GATE_EXIT=$?
          set -e
          ./scripts/trace_soft_gate.sh trace-gate.json "$GATE_EXIT"
          exit 0

      - name: Upload compare report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-eval-compare-report
          path: notes/agent-eval/reports/TRACE-EVAL-COMPARE.md
          if-no-files-found: warn
