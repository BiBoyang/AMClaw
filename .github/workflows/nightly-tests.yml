name: Nightly Tests

on:
  schedule:
    # 每天北京时间凌晨 2:00 运行（UTC 18:00）
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Check commits in last 24h
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: yesterday.toISOString(),
              per_page: 1
            });
            const hasChanges = commits.length > 0;
            core.setOutput('has_changes', hasChanges.toString());
            console.log(`Last 24h commits: ${commits.length}, run tests: ${hasChanges}`);

  test:
    needs: check-changes
    if: ${{ github.event_name != 'schedule' || needs.check-changes.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain info
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build 2>&1 | tee build.log

      - name: Run Tests
        run: cargo test 2>&1 | tee test.log

      - name: Show test results
        if: always()
        run: |
          echo "=== BUILD LOG (last 50 lines) ==="
          tail -50 build.log 2>/dev/null || echo "(build.log not found)"
          echo ""
          echo "=== TEST LOG (last 100 lines) ==="
          tail -100 test.log 2>/dev/null || echo "(test.log not found)"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-logs
          path: |
            build.log
            test.log
