name: trace-eval-compare

on:
  pull_request:
    branches:
      - main

env:
  GATE_MODE: soft   # 可选：soft / hard；见 notes/agent-eval/specs/GATE-POLICY-SPEC-2026-05-08.md

jobs:
  trace-compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy with deny warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run all tests
        run: cargo test

      - name: Cargo check
        run: cargo check

      - name: Trace eval unit tests
        run: cargo test --bin trace_eval

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Show shellcheck version
        run: |
          command -v shellcheck
          shellcheck --version

      - name: Lint shell scripts
        run: make lint-scripts

      - name: Script regression tests
        run: bash scripts/tests/test_trace_soft_gate.sh

      - name: Run trace compare
        run: ./scripts/trace_compare.sh

      - name: Gate with --gate-json
        run: |
          if [ "$GATE_MODE" != "soft" ] && [ "$GATE_MODE" != "hard" ]; then
            echo "::error::Invalid GATE_MODE: $GATE_MODE (expected: soft or hard)"
            exit 2
          fi
          set +e
          GATE_JSON=1 ./scripts/eval_gate.sh > trace-gate.json
          GATE_EXIT=$?
          set -e
          ./scripts/trace_soft_gate.sh trace-gate.json "$GATE_EXIT" || true
          if [ "$GATE_MODE" = "hard" ]; then
            exit "$GATE_EXIT"
          fi
          exit 0

      - name: Upload compare report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-eval-compare-report
          path: notes/agent-eval/reports/TRACE-EVAL-COMPARE.md
          if-no-files-found: warn
